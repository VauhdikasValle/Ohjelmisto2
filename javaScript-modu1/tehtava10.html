<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tehtava10</title>
</head>
<body>
<p id="result"></p>

<script>
    const diceCount = Number(prompt("Enter number of dice: "));
    const targetSum = Number(prompt("Enter desired sum: "));

const simulations = 10000;
let successCount = 0;

for (let i = 0; i < simulations; i++) {

    let sum = 0;

    for (let j = 0; j < diceCount; j++) {
        sum += Math.floor(Math.random() * 6) + 1;
    }

    if (sum === targetSum) {
        successCount++;
    }
}

const probability = (successCount / simulations) * 100;

document.write(
    "Probability to get sum " +
    targetSum +
    " with " +
    diceCount +
    " dice is " +
    probability.toFixed(2) +
    "%"
);

</script>

</body>
</html>
